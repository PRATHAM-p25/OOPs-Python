{% extends "base.html" %}

{% block title %}Add Feedback{% endblock %}

{% block content %}
    <h1>Add feedback</h1>

    <form method="POST" action="{{ url_for('add_feedback') }}">
        <label>Name:</label>
        <input type="text" name="name">

        <br><br>

        <label>Message:</label>
        <textarea name="message"></textarea>

        <br><br>

        <button type="submit">Submit</button>
    </form>
{% endblock %}
